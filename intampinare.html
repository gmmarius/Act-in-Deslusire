    <h1>Întâmpinare</h1>

    <p>
      Dacă ai ajuns aici, nu trebuie să știi nimic.<br>
      Nu e nevoie să înțelegi totul, nici să fii de<br>
      acord. E de ajuns să fii sincer înăuntrul tău.<br>
      IE–Viie nu oferă explicații — ci întâlniri.<br>
      Poți pleca oricând. Sau poți rămâne — și<br>
      începe să simți.
    </p>
